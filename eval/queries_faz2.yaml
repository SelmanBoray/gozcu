# Faz 2 VLM eval — uçtan uca pipeline (search use_vlm=True) beklenti-eşleşme skoru.
# Pre-registration: sorgular + beklentiler sonuca bakmadan/gözle-doğrulanmış ground-truth'la yazıldı.
#
# expect: pipeline'ın DOĞRU çıktısı (objektif skor için)
#   not_found   — konsept korpusta yok → bulunamadı/0 sonuç dönmeli
#   has_results — geçerli eşleşme var → ≥1 sonuç dönmeli
#   any         — outcome iddia EDİLMEZ (korpus içeriği belirsiz); yalnız `forbid` ekseni ölçülür
# forbid: sonuçlara SIZMAMASI gereken YOLO sınıfları (ayrım ekseni — outcome'dan ortogonal)
#   vehicles    — sembolik → gozcu.query.VEHICLE_CLASSES. Depodaki yolo_class TÜRKÇE (araba/kamyon/
#                 otobüs); İngilizce liste yazma → kontrol sessizce boşa geçer (AI Engineer uyarısı).
# Kovalar: negation, attribute (renk), positive_ctrl, hard_negative (renk kıyafete mi araca mı)

# ═══ NEGASYON (konsept korpusta yok → bulunamadı beklenir) ═══
- id: f2_neg_kopek
  query: "köpek gezdiren adam"
  bucket: negation
  expect: not_found            # korpusta köpek yok (gözle doğrulandı)
- id: f2_neg_yagmur
  query: "yağmurda şemsiyeli insanlar"
  bucket: negation
  expect: not_found            # yağmur/şemsiye sahnesi yok
- id: f2_neg_kar
  query: "karla kaplı sokak"
  bucket: negation
  expect: not_found            # kar sahnesi yok (açık zemin false-accept riski)

# ═══ ÖZNİTELİK (renk — VLM doğrulamalı) ═══
- id: f2_attr_siyah_suv
  query: "siyah SUV araç"
  bucket: attribute
  expect: has_results          # siyah SUV var (gözle doğrulandı, 8 sonuç)
- id: f2_attr_mavi_kamyonet
  query: "mavi kamyonet"
  bucket: attribute
  expect: not_found            # korpusta mavi kamyonet yok — ama BİLİNEN MODEL TAVANI:
  # qwen2.5vl mavi/teal'i karıştırıyor (teal otobüs→"mavi") + bulanık kırpıkta kamyonet/otobüs
  # ayrımı zayıf → yanlış-kabul. Sıkı renk promptu denendi: mavi'yi kesti AMA kırmızı/siyah'ı da
  # öldürdü (6/6→2/6, aşırı-muhafazakâr) → temiz fix yok. Dürüst FAIL olarak tutuluyor (skoru
  # şişirme); daha iyi VLM/korpus gelince yükselir. Detay: renk_prompt_ab.py
- id: f2_attr_beyaz_arac
  query: "beyaz renkli araba"
  bucket: attribute
  expect: has_results          # beyaz araba yaygın
- id: f2_attr_kirmizi_arac
  query: "kırmızı araba"
  bucket: attribute
  expect: has_results          # kırmızı araba var (gözle doğrulandı, 7)

# ═══ POZİTİF KONTROL (geçerli eşleşme — VLM yanlış-reddetmemeli) ═══
- id: f2_ctrl_otobus
  query: "otobüs"
  bucket: positive_ctrl
  expect: has_results          # ucf_trafik'te otobüs var
- id: f2_ctrl_yuruyen_insan
  query: "yürüyen insan"
  bucket: positive_ctrl
  expect: has_results          # her yerde insan var
- id: f2_ctrl_kamyon
  query: "kamyon"
  bucket: positive_ctrl
  expect: has_results          # kamyon var

# ═══ HARD-NEGATIVE (ayrım — renk KIYAFETE ait, araca sızmamalı) ═══
# Bu oturumun asıl bug'ının regresyon koruması: "kırmızı kıyafetli adam" KIRMIZI ARABA getiriyordu.
# Düzeltme (verifier: kişi→"is wearing X clothing"; füzyon: color_match=False araç elenir) burada
# kilitlenir — ileride bir prompt tweak'i bunu bozarsa bu sorgular yakalar.
# expect: any → korpusta kırmızı/siyah-kıyafetli insan GARANTİ değil; outcome iddia edilmez.
# forbid: vehicles → ne dönerse dönsün araç sınıfı (araba/kamyon/otobüs…) sonuçlara SIZMAMALI.
- id: hn_kirmizi_kiyafet
  query: "kırmızı kıyafetli adam"
  bucket: hard_negative
  expect: any
  forbid: vehicles             # kırmızı araba sızmamalı — bug'ın birebir tekrarı
- id: hn_siyah_kiyafet
  query: "siyah kıyafetli kişi"
  bucket: hard_negative
  expect: any
  forbid: vehicles             # siyah SUV korpusta KESİN var → sızma cazibesi gerçek (daha zorlu test)
