# DEV bataryası — Olgu B (sahne karesi kırpık selinde gömülüyor) için λ kalibrasyonu.
# KİLİTLİ DEĞİL — λ burada seçilir, v1/v2'de DOĞRULANIR (AI Engineer S4: dev/kilitli ayrı).
# Pre-registration: sorgular sonuca bakılmadan, doğal ifadelerle yazıldı.
#
# Metrik: "sahne-karesi sırası" = top-k'da (video_id ∈ relevant VE source==frame) ilk hit.
